name: Publish to Maven Central

on:
  push:
    tags: ['v*', 'V*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Dispatch target: ubuntu (default) or windows (self-hosted)'
        required: false
        default: 'ubuntu'
        type: choice
        options: [ubuntu, windows]

permissions:
  contents: write

jobs:

  dry-run-ubuntu:
    name: Dry-run build -- ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target != 'windows'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 -- no GPG (dry-run)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Guard Maven coordinates
        run: |
          GID="$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)"
          AID="$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)"
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          [ "$GID" = "org.aspose" ]           || { echo "groupId must be org.aspose (got $GID)"; exit 1; }
          [ "$AID" = "aspose-3d-foss" ]       || { echo "artifactId must be aspose-3d-foss (got $AID)"; exit 1; }
          case "$VER" in *-SNAPSHOT|*-alpha*) echo "Pre-release versions cannot be published"; exit 1 ;; esac
          echo "Coordinates OK: ${GID}:${AID}:${VER}"

      - name: Check version not already on Maven Central
        run: |
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" "https://repo1.maven.org/maven2/org/aspose/aspose-3d-foss/${VER}/")"
          [ "$STATUS" = "200" ] && { echo "Version ${VER} already on Maven Central"; exit 1; } || echo "Version ${VER} not yet on Central -- OK"

      - name: Secret scan
        run: |
          git grep -nI -E "BEGIN PGP PRIVATE KEY BLOCK|BEGIN PGP PUBLIC KEY BLOCK" \
            -- ':!.github/workflows/maven-central-release.yml' \
            && { echo "PGP key block found -- aborting"; exit 1; } || true

      - name: Build (gpg.skip=true)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: mvn -B clean verify -Dgpg.skip=true -DskipTests

      - name: Verify 3 jars exist
        run: |
          AID="aspose-3d-foss"
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          for f in "target/${AID}-${VER}.jar" "target/${AID}-${VER}-sources.jar" "target/${AID}-${VER}-javadoc.jar"; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All 3 jars present."

      - name: Verify clean working tree
        run: |
          git diff --exit-code
          git diff --cached --exit-code
          [ -z "$(git ls-files --others --exclude-standard)" ] || { echo "Untracked files after build"; exit 1; }

      - run: echo "::notice::DEPLOY SKIPPED -- dry-run job"

  dry-run-windows:
    name: Dry-run build -- Windows self-hosted (maven-pilot)
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'windows'
    runs-on: [self-hosted, Windows, maven-pilot]
    steps:
      - name: Export user PATH
        shell: powershell
        run: |
          $userPath = [System.Environment]::GetEnvironmentVariable('PATH', 'User')
          $userPath -split ';' | Where-Object { $_ -ne '' } | ForEach-Object {
              Add-Content -Path $env:GITHUB_PATH -Value $_
          }

      - uses: actions/checkout@v4

      - name: Set up Java 21 -- no GPG (dry-run)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Guard Maven coordinates
        shell: powershell
        run: |
          [xml]$pom = Get-Content pom.xml
          $GID = $pom.project.groupId
          $AID = $pom.project.artifactId
          $VER = $pom.project.version
          if ([string]::IsNullOrEmpty($GID) -or [string]::IsNullOrEmpty($AID) -or [string]::IsNullOrEmpty($VER)) {
            Write-Error 'Failed to parse pom.xml'; exit 1
          }
          if ($GID -ne 'org.aspose')        { Write-Error "groupId must be org.aspose (got $GID)"; exit 1 }
          if ($AID -ne 'aspose-3d-foss')    { Write-Error "artifactId must be aspose-3d-foss (got $AID)"; exit 1 }
          if ($VER -match '-SNAPSHOT|-alpha') { Write-Error 'Pre-release versions cannot be published'; exit 1 }
          Write-Host "Coordinates verified: ${GID}:${AID}:${VER}"

      - name: Check version not already on Maven Central
        shell: powershell
        run: |
          [xml]$pom = Get-Content pom.xml
          $VER = $pom.project.version
          $URL = "https://repo1.maven.org/maven2/org/aspose/aspose-3d-foss/$VER/"
          try {
            $r = Invoke-WebRequest -Uri $URL -Method Head -UseBasicParsing -ErrorAction Stop
            Write-Error "Version $VER already on Maven Central: $URL"; exit 1
          } catch {
            if ($_.Exception.Response.StatusCode.value__ -ne 404) { throw }
            Write-Host "Version $VER not yet on Maven Central -- OK."
          }

      - name: Secret scan
        shell: powershell
        run: |
          $pgp = & git grep -nI -E 'BEGIN PGP PRIVATE KEY BLOCK|BEGIN PGP PUBLIC KEY BLOCK' -- ':(exclude).github/workflows/maven-central-release.yml' 2>&1
          if ($pgp) { Write-Error 'PGP key block found -- aborting'; exit 1 }
          Write-Host 'Secret scan: CLEAN'
          exit 0

      - name: Build (gpg.skip=true)
        shell: powershell
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: mvn -B clean verify '-Dgpg.skip=true' '-DskipTests'

      - name: Verify 3 jars exist
        shell: powershell
        run: |
          $AID = 'aspose-3d-foss'
          [xml]$pom = Get-Content pom.xml
          $VER = $pom.project.version
          @("target\$AID-$VER.jar","target\$AID-$VER-sources.jar","target\$AID-$VER-javadoc.jar") | ForEach-Object {
            if (-not (Test-Path $_)) { Write-Error "Missing: $_"; exit 1 }
          }
          Write-Host 'All 3 jars present.'

      - name: Verify clean working tree
        shell: powershell
        run: |
          & git diff --exit-code; if ($LASTEXITCODE -ne 0) { exit 1 }
          & git diff --cached --exit-code; if ($LASTEXITCODE -ne 0) { exit 1 }
          $u = & git ls-files --others --exclude-standard
          if ($u) { Write-Error "Untracked files: $u"; exit 1 }

      - run: Write-Host '::notice::DEPLOY SKIPPED -- dry-run-windows'
        shell: powershell

  release-deploy:
    name: Build, sign, and deploy Maven release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 with GPG import
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Guard coordinates and verify tag matches pom version
        run: |
          GID="$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)"
          AID="$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)"
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          [ "$GID" = "org.aspose" ]           || { echo "groupId must be org.aspose (got $GID)"; exit 1; }
          [ "$AID" = "aspose-3d-foss" ]       || { echo "artifactId must be aspose-3d-foss (got $AID)"; exit 1; }
          case "$VER" in *-SNAPSHOT|*-alpha*) echo "Pre-release versions cannot be published"; exit 1 ;; esac
          TAG="${{ github.ref_name }}"
          TAG_VER="${TAG#[vV]}"
          [ "$TAG_VER" = "$VER" ] || { echo "Tag $TAG does not match pom.xml version $VER"; exit 1; }
          echo "Coordinates OK: ${GID}:${AID}:${VER} (tag: ${TAG})"

      - name: Check version not already on Maven Central
        run: |
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" "https://repo1.maven.org/maven2/org/aspose/aspose-3d-foss/${VER}/")"
          [ "$STATUS" = "200" ] && { echo "Version ${VER} already on Maven Central -- nothing to do"; exit 1; } || echo "Version ${VER} not yet on Central -- proceeding"

      - name: Secret scan
        run: |
          git grep -nI -E "BEGIN PGP PRIVATE KEY BLOCK|BEGIN PGP PUBLIC KEY BLOCK" \
            -- ':!.github/workflows/maven-central-release.yml' \
            && { echo "PGP key block found -- aborting"; exit 1; } || true

      - name: Create GitHub Release if not exists
        run: |
          TAG="${{ github.ref_name }}"
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists -- skipping creation"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Release $TAG" \
              --generate-notes \
              --latest
            echo "Created GitHub Release $TAG"
          fi

      - name: Build, package, and sign
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B clean verify -DskipTests

      - name: Verify 6 artifacts (3 jars + 3 signatures)
        run: |
          AID="aspose-3d-foss"
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          for f in \
            "target/${AID}-${VER}.jar" \
            "target/${AID}-${VER}-sources.jar" \
            "target/${AID}-${VER}-javadoc.jar" \
            "target/${AID}-${VER}.jar.asc" \
            "target/${AID}-${VER}-sources.jar.asc" \
            "target/${AID}-${VER}-javadoc.jar.asc"; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All 6 artifacts present."

      - name: Verify clean working tree
        run: |
          git diff --exit-code
          git diff --cached --exit-code
          [ -z "$(git ls-files --others --exclude-standard)" ] || { echo "Untracked files after build"; exit 1; }

      - name: Deploy to Maven Central (autoPublish=true)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B deploy -DskipTests

      - name: Verify artifact available on Maven Central (best-effort, 10 min)
        run: |
          AID="aspose-3d-foss"
          VER="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          URL="https://repo1.maven.org/maven2/org/aspose/${AID}/${VER}/${AID}-${VER}.jar"
          echo "Polling Maven Central: $URL"
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "::notice::Artifact confirmed on Maven Central: $URL"
              exit 0
            fi
            echo "Attempt $i/6: HTTP $STATUS -- waiting 2 min..."
            sleep 120
          done
          echo "::warning::Artifact not yet on Maven Central after 10 min. Central sync typically takes 30min-4h. Deployment was submitted successfully."
